name: Publish

on: [push]

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Install xelatex
        run: sudo apt-get install -y texlive-xetex texlive-fonts-extra fonts-ebgaramond fonts-open-sans poppler-utils
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Download fonts
        run: npm install
      - name: Build Pages Only
        run: |
          PYTHONPATH=. invoke build
          test -f content/extra/cv.pdf
          test 2 == "$(pdfinfo content/extra/cv.pdf | awk '/^Pages:/ {print $2}')"
      - name: Build Pages and Publish
        if: github.ref == 'refs/heads/main'
        run: PYTHONPATH=. invoke publish && tree dist
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
